<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BiblioVolta - Login</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(160deg, #1db980 0%, #13a06a 40%, #0d8a58 100%);
            padding: 24px 16px;
        }

        .wrapper {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 28px;
        }

        /* ---- topo ---- */
        .topo { text-align: center; }

        .logo-box {
            width: 72px;
            height: 72px;
            background: #fff;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            box-shadow: 0 6px 24px rgba(0,0,0,0.18);
        }

        .topo h1 {
            font-size: 30px;
            font-weight: 700;
            color: #fff;
            letter-spacing: -0.5px;
            margin-bottom: 6px;
        }

        .topo p {
            font-size: 14px;
            color: rgba(255,255,255,0.85);
        }

        /* ---- card ---- */
        .card {
            width: 100%;
            background: #fff;
            border-radius: 16px;
            padding: 36px 32px 28px;
            box-shadow: 0 16px 56px rgba(0,0,0,0.22);
        }

        .card h2 {
            font-size: 20px;
            font-weight: 600;
            color: #1e293b;
            text-align: center;
            margin-bottom: 26px;
        }

        /* ---- alerta ---- */
        .alerta {
            background: #fee2e2;
            color: #dc2626;
            border: 1px solid #fca5a5;
            border-radius: 8px;
            padding: 12px 14px;
            font-size: 14px;
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* ---- form ---- */
        .grupo { margin-bottom: 18px; }

        .grupo label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #334155;
            margin-bottom: 7px;
        }

        .input-wrap {
            display: flex;
            align-items: center;
            background: #f8fafc;
            border: 1.5px solid #e2e8f0;
            border-radius: 10px;
            padding: 0 14px;
            height: 46px;
            gap: 10px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .input-wrap:focus-within {
            border-color: #1db980;
            background: #fff;
            box-shadow: 0 0 0 3px rgba(29,185,128,0.15);
        }

        .input-wrap svg { flex-shrink: 0; }

        .input-wrap input {
            flex: 1;
            border: none;
            background: transparent;
            outline: none;
            font-size: 15px;
            color: #1e293b;
            height: 100%;
        }

        .input-wrap input::placeholder { color: #94a3b8; }

        /* ---- botão ---- */
        .btn-entrar {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #1db980, #13a06a);
            color: #fff;
            font-size: 15px;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 8px;
            margin-bottom: 20px;
            letter-spacing: 0.01em;
            transition: opacity 0.2s, transform 0.1s;
        }

        .btn-entrar:hover { opacity: 0.9; }
        .btn-entrar:active { transform: scale(0.99); }

        /* ---- credenciais ---- */
        .hint {
            text-align: center;
            font-size: 12.5px;
            color: #1db980;
            line-height: 1.8;
        }

        .hint strong { font-weight: 600; }
    </style>
</head>
<body>

<div class="wrapper">

    <!-- TOPO -->
    <div class="topo">
        <div class="logo-box">
            <svg xmlns="http://www.w3.org/2000/svg" width="38" height="38" viewBox="0 0 24 24"
                 fill="none" stroke="#1db980" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
                <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
            </svg>
        </div>
        <h1>BiblioVolta</h1>
        <p>Sistema de Gestão de Biblioteca</p>
    </div>

    <!-- CARD -->
    <div class="card">
        <h2>Bem-vindo de volta</h2>

        <div th:if="${param.error}" class="alerta">
            ⚠️ Login ou senha inválidos.
        </div>

        <div th:if="${param.logout}" class="alerta" style="background:#dcfce7;color:#166534;border-color:#86efac;">
            ✅ Você saiu com sucesso.
        </div>

        <form th:action="@{/login}" method="post">

            <div class="grupo">
                <label for="login">Email</label>
                <div class="input-wrap">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                         fill="none" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect width="20" height="16" x="2" y="4" rx="2"/>
                        <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
                    </svg>
                    <input type="text" id="login" name="login"
                           placeholder="seu@email.com" required autocomplete="username">
                </div>
            </div>

            <div class="grupo">
                <label for="senha">Senha</label>
                <div class="input-wrap">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                         fill="none" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect width="18" height="11" x="3" y="11" rx="2" ry="2"/>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                    </svg>
                    <input type="password" id="senha" name="senha"
                           placeholder="••••••••" required autocomplete="current-password">
                </div>
            </div>

            <button type="submit" class="btn-entrar">Entrar no Sistema</button>

        </form>


    </div>

</div>

</body>
</html>
