<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblioteca - Cadastrar Aluno</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
    <div class="navbar-brand">
        <span></span> BiblioVOLTA
    </div>
    <div class="navbar-user">
        <span>Olá, <strong th:text="${usuario.nome}">Usuário</strong></span>
        <form th:action="@{/logout}" method="post" style="display:inline">
            <button type="submit" class="btn btn-outline-sm">Sair</button>
        </form>
    </div>
</nav>

<div class="container container-form">

    <div class="form-card">

        <div class="form-card-header">
            <h2>Cadastrar Aluno</h2>
            <a th:href="@{/dashboard}" class="btn btn-ghost">← Voltar</a>
        </div>

        <form th:action="@{/alunos/salvar}" th:object="${aluno}" method="post">

            <div class="form-group">
                <label for="nome">Nome <span class="obrigatorio">*</span></label>
                <input type="text"
                       id="nome"
                       th:field="*{nome}"
                       placeholder="Ex: João da Silva"
                       class="form-control"
                       th:classappend="${#fields.hasErrors('nome')} ? 'input-erro' : ''">
                <span class="erro-msg" th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}"></span>
            </div>

            <div class="form-group">
                <label for="rgm">RGM <span class="obrigatorio">*</span></label>
                <input type="text"
                       id="rgm"
                       th:field="*{rgm}"
                       placeholder="Ex: 12345678"
                       class="form-control"
                       th:classappend="${#fields.hasErrors('rgm')} ? 'input-erro' : ''">
                <span class="erro-msg" th:if="${#fields.hasErrors('rgm')}" th:errors="*{rgm}"></span>
            </div>

            <div class="form-group">
                <label for="curso">Curso <span class="obrigatorio">*</span></label>
                <input type="text"
                       id="curso"
                       th:field="*{curso}"
                       placeholder="Ex: Análise e Desenvolvimento de Sistemas"
                       class="form-control"
                       th:classappend="${#fields.hasErrors('curso')} ? 'input-erro' : ''">
                <span class="erro-msg" th:if="${#fields.hasErrors('curso')}" th:errors="*{curso}"></span>
            </div>

            <div class="form-acoes">
                <a th:href="@{/dashboard}" class="btn btn-ghost">Cancelar</a>
                <button type="submit" class="btn btn-primary">Cadastrar Aluno</button>
            </div>

        </form>

    </div>

</div>

</body>
</html>
